name: Terraform

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Infra module to deploy"
        type: choice
        required: true
        options:
          - cdn
          - dns
          - iam
      environment:
        description: "Target environment"
        type: choice
        required: true
        options:
          - development
          - production

permissions:
  contents: read
  id-token: write

env:
  AWS_DEFAULT_ACCOUNT: ${{ secrets.AWS_DEFAULT_ACCOUNT }}
  AWS_DEFAULT_REGION:  ${{ secrets.AWS_DEFAULT_REGION }}

jobs:

  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    steps:
      # only the repo owner can trigger a deploy
      - name: Check actor
        run: |
          set -eo pipefail
          if [[ "${{ github.actor }}" != "${{ github.repository_owner }}" ]]; then
            echo "::error::${{ github.actor }} is not authorized — deploy blocked."
            exit 1
          fi

  resolve:
    name: Resolve Module
    runs-on: ubuntu-latest
    needs: authorize
    outputs:
      working_dir: ${{ steps.map.outputs.working_dir }}
    steps:
      # map the module input to its directory — no path detection needed
      - name: Map module to working directory
        id: map
        run: |
          set -eo pipefail
          case "${{ inputs.module }}" in
            cdn) echo "working_dir=infra/cdn"         >> $GITHUB_OUTPUT ;;
            dns) echo "working_dir=infra/route53/dns" >> $GITHUB_OUTPUT ;;
            iam) echo "working_dir=infra/iam"         >> $GITHUB_OUTPUT ;;
            *)
              echo "::error::Unknown module: ${{ inputs.module }}"
              exit 1
              ;;
          esac

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: resolve
    defaults:
      run:
        working-directory: ${{ needs.resolve.outputs.working_dir }}
    steps:
      # pull the code
      - name: Checkout
        uses: actions/checkout@v4

      # pin to a known-good version — avoids surprise breakage on latest
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.1

      # catch formatting drift before apply
      - name: Format check
        run: |
          set -eo pipefail
          tofu fmt -check -recursive

      # no backend needed for static validation
      - name: Init
        run: |
          set -eo pipefail
          tofu init -backend=false

      # validate resource configs and variable references
      - name: Validate
        run: |
          set -eo pipefail
          tofu validate

      # policy-as-code — hard fail on any security violations
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ needs.resolve.outputs.working_dir }}
          framework: terraform
          soft_fail: false

      # second opinion on misconfigs and vulnerabilities
      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: ${{ needs.resolve.outputs.working_dir }}
          exit-code: 1
          severity: HIGH,CRITICAL

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [resolve, validate]
    defaults:
      run:
        working-directory: ${{ needs.resolve.outputs.working_dir }}
    env:
      TF_VAR_domain_name:                   ${{ secrets.DOMAIN_NAME }}
      TF_VAR_route53_zone_id:               ${{ secrets.ROUTE53_ZONE_ID }}
      TF_VAR_google_dkim_value:             ${{ secrets.GOOGLE_DKIM_VALUE }}
      TF_VAR_google_workspace_verification: ${{ secrets.GOOGLE_WORKSPACE_VERIFICATION }}
      TF_VAR_cloudfront_domain_name:        ${{ secrets.CLOUDFRONT_DOMAIN_NAME }}
      TF_VAR_aws_account_id:                ${{ secrets.AWS_DEFAULT_ACCOUNT }}
      TF_VAR_github_org:                    ${{ github.repository_owner }}
      TF_VAR_github_repo:                   ${{ github.event.repository.name }}
      TF_VAR_environment:                   ${{ inputs.environment }}
    steps:
      # pull the code
      - name: Checkout
        uses: actions/checkout@v4

      # pin to a known-good version
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.1

      # auth to AWS via OIDC — no static credentials needed
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_DEFAULT_ACCOUNT }}:role/github-actions-execution-role
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # confirms the OIDC auth worked before proceeding
      - name: Verify AWS credentials
        run: |
          set -eo pipefail
          aws sts get-caller-identity

      # init with real backend — reads state for accurate diff
      - name: Init
        run: |
          set -eo pipefail
          tofu init

      # generate a timestamped plan binary
      - name: Plan
        run: |
          set -eo pipefail
          PLAN_FILE="tfplan-$(date +%Y%m%d%H%M%S).bin"
          echo "PLAN_FILE=$PLAN_FILE" >> $GITHUB_ENV
          tofu plan -out=$PLAN_FILE

      # convert to JSON so Checkov can inspect what will be deployed
      - name: Export plan JSON
        run: |
          set -eo pipefail
          tofu show -json $PLAN_FILE > plan.json

      # scan the resolved plan, not just source — catches dynamic values
      - name: Checkov plan scan
        uses: bridgecrewio/checkov-action@v12
        with:
          file: ${{ needs.resolve.outputs.working_dir }}/plan.json
          framework: terraform_plan
          soft_fail: false

      # keyed on run_id so apply picks up the exact binary from this run
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ needs.resolve.outputs.working_dir }}/tfplan-*.bin
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [resolve, validate, plan]
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ needs.resolve.outputs.working_dir }}
    env:
      TF_VAR_domain_name:                   ${{ secrets.DOMAIN_NAME }}
      TF_VAR_route53_zone_id:               ${{ secrets.ROUTE53_ZONE_ID }}
      TF_VAR_google_dkim_value:             ${{ secrets.GOOGLE_DKIM_VALUE }}
      TF_VAR_google_workspace_verification: ${{ secrets.GOOGLE_WORKSPACE_VERIFICATION }}
      TF_VAR_cloudfront_domain_name:        ${{ secrets.CLOUDFRONT_DOMAIN_NAME }}
      TF_VAR_aws_account_id:                ${{ secrets.AWS_DEFAULT_ACCOUNT }}
      TF_VAR_github_org:                    ${{ github.repository_owner }}
      TF_VAR_github_repo:                   ${{ github.event.repository.name }}
      TF_VAR_environment:                   ${{ inputs.environment }}
    steps:
      # pull the code
      - name: Checkout
        uses: actions/checkout@v4

      # pin to a known-good version
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9.1

      # auth to AWS via OIDC — no static credentials needed
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_DEFAULT_ACCOUNT }}:role/github-actions-execution-role
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      # confirms the OIDC auth worked before proceeding
      - name: Verify AWS credentials
        run: |
          set -eo pipefail
          aws sts get-caller-identity

      # init with real backend
      - name: Init
        run: |
          set -eo pipefail
          tofu init

      # download the exact binary produced by plan in this same run
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ needs.resolve.outputs.working_dir }}

      # environment gate (configured in GitHub settings) pauses here for approval
      - name: Apply
        run: |
          set -eo pipefail
          PLAN_FILE=$(ls tfplan-*.bin)
          tofu apply -auto-approve "$PLAN_FILE"